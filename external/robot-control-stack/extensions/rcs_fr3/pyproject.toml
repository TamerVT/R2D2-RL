[build-system]
requires = [
  "build",
  "wheel",
  "setuptools>=45",
  "scikit-build-core>=0.3.3",
  "pybind11",
  "cmake",
  "ninja",
  "pin==3.7.0",
]
build-backend = "scikit_build_core.build"

[project]
name = "rcs_fr3"
version = "0.7.0"
description = "RCS libfranka integration"
dependencies = ["rcs>=0.7.0", "frankik"]
readme = "README.md"
maintainers = [{ name = "Tobias Jülg", email = "tobias.juelg@utn.de" }]
authors = [{ name = "Tobias Jülg", email = "tobias.juelg@utn.de" }]
requires-python = ">=3.11"


[tool.scikit-build]
build.verbose = true
build.targets = ["_core"]
logging.level = "INFO"
build-dir = "build"
wheel.packages = ["src/rcs_fr3"]
install.components = ["python_package"]

[tool.black]
line-length = 120
target-version = ["py310"]

[tool.isort]
profile = "black"
