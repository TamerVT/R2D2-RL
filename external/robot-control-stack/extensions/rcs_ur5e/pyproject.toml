[build-system]
requires = ["setuptools"]
build-backend = "setuptools.build_meta"

[project]
name = "rcs_ur5e"
version = "0.7.0"
description = "RCS UR5e module"
dependencies = ["rcs>=0.7.0", "ur_rtde==1.6.1"]
readme = "README.md"
maintainers = [
  { name = "Johannes Hechtl", email = "johannes.hechtl@siemens.com" },
]
authors = [
  { name = "Tobias Jülg", email = "tobias.juelg@utn.de" },
  { name = "Johannes Hechtl", email = "johannes.hechtl@siemens.com" },
]
requires-python = ">=3.11"

[tool.black]
line-length = 120
target-version = ["py310"]

[tool.isort]
profile = "black"
